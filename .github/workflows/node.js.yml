name: Zuvara Frontend CI/CD (VPS)

on:
  push:
    branches: ["master", "main"]

concurrency:
  group: zuvara-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}   # aditya
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            echo "✅ SSH connection successful!"
            echo "👤 User: $(whoami)"

            APP_DIR="/var/www/Zuvara-frontend"
            BRANCH="${{ github.ref_name }}"
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"

            echo "📦 Deploying branch: $BRANCH"

            # Bootstrap the app directory on first deploy.
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "📁 $APP_DIR not found or not a git repo — cloning..."
              # Create the parent dir (sudo only if we lack write permission).
              if [ ! -w "$(dirname "$APP_DIR")" ]; then
                sudo mkdir -p "$APP_DIR"
                sudo chown -R "$(whoami)":"$(whoami)" "$APP_DIR"
              else
                mkdir -p "$APP_DIR"
              fi
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            else
              cd "$APP_DIR"
            fi

            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Ensure pnpm path for non-interactive ssh
            export NPM_CONFIG_PREFIX="$HOME/.npm-global"
            export PATH="$HOME/.npm-global/bin:$PATH"

            echo "🧰 Node: $(node -v)"
            echo "🧰 npm: $(npm -v)"

            # Install pnpm if missing
            if ! command -v pnpm >/dev/null 2>&1; then
              echo "📦 pnpm not found, installing..."
              npm i -g pnpm@10.15.0
            fi
            echo "🧰 pnpm: $(pnpm -v)"

            echo "📥 Installing dependencies..."
            pnpm install --no-frozen-lockfile

            echo "🛠 Building..."
            pnpm build

            # Ensure pm2 exists
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "📦 pm2 not found, installing..."
              npm i -g pm2
            fi

            echo "🔄 Restarting PM2..."
            if pm2 describe "zuvara-frontend" >/dev/null 2>&1; then
              pm2 restart "zuvara-frontend" --time
            else
              pm2 start pnpm --name "zuvara-frontend" --time --cwd "$APP_DIR" -- start
            fi

            pm2 save
            echo "✅ Deploy complete!"
